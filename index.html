<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مصحف وليد الإلكتروني</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');

body {
font-family: 'Amiri', serif;
background-color: #f0f4f2;
margin: 0;
padding: 20px;
display: flex;
flex-direction: column;
align-items: center;
}

.container {
width: 100%;
max-width: 850px;
background: white;
padding: 30px;
border-radius: 15px;
box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h1 { color: #2d5a27; font-size: 2.5rem; margin-bottom: 20px; }

.controls-card {
background: #e8f5e9;
padding: 20px;
border-radius: 12px;
margin-bottom: 30px;
border: 1px solid #c8e6c9;
}

select {
width: 100%;
max-width: 350px;
padding: 12px;
border-radius: 8px;
border: 2px solid #2d5a27;
font-family: 'Amiri', serif;
font-size: 1.1rem;
margin-bottom: 15px;
}

audio { width: 100%; height: 45px; }

.surah-title {
background: #2d5a27;
color: white;
padding: 15px;
border-radius: 10px;
font-size: 2.2rem;
margin: 25px 0;
}

.ayah-box {
background: #fff;
border-bottom: 1px solid #eee;
padding: 25px;
margin-bottom: 10px;
text-align: right;
}

.ayah-text {
font-size: 1.9rem;
line-height: 2.2;
color: #333;
margin-bottom: 15px;
}

.ayah-meta {
display: flex;
justify-content: flex-start;
gap: 15px;
font-family: sans-serif;
font-size: 0.9rem;
}

.badge {
background: #f1f8e9;
color: #2d5a27;
padding: 4px 10px;
border-radius: 5px;
font-weight: bold;
}
</style>

</head>
<body>

<div class="container">
<h1>مصحف وليد الإلكتروني 📖</h1>

<div class="controls-card">
    <label style="display:block; margin-bottom:10px;">اختر السورة للاستماع والقراءة:</label>
    <select id="surahSelector" onchange="updateView()">
        <option value="">-- اختر السورة (114) --</option>
    </select>
    <div id="playerSpace"></div>
</div>

<div id="mainDisplay">سيتم عرض الآيات والتشكيل هنا</div>
</div>

<script>
const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

const menu = document.getElementById('surahSelector');
surahs.forEach((s, i) => {
let opt = document.createElement('option');
opt.value = i + 1;
opt.textContent = (i + 1) + ". " + s;
menu.appendChild(opt);
});

async function updateView() {
const sId = menu.value;
if(!sId) return;

// تشغيل الصوت
const audioUrl = `https://server8.mp3quran.net/afs/${sId.padStart(3, &#39;0&#39;)}.mp3`;
document.getElementById(&#39;playerSpace&#39;).innerHTML = `&lt;audio controls src=&quot;${audioUrl}&quot;&gt;&lt;/audio&gt;`;

const display = document.getElementById(&#39;mainDisplay&#39;);
display.innerHTML = &quot;جارٍ جلب البيانات...&quot;;

try {
    const res = await fetch(&#39;/api?surah=&#39; + sId);
    const data = await res.json();
    
    let content = `&lt;div class=&quot;surah-title&quot;&gt;${data.name}&lt;/div&gt;`;
    
    data.ayahs.forEach(a =&gt; {
        content += `
            &lt;div class=&quot;ayah-box&quot;&gt;
                &lt;div class=&quot;ayah-text&quot;&gt;${a.aya_text || a.aya_text_emlaey} &lt;span style=&quot;color:#2d5a27;&quot;&gt;(${a.aya_no})&lt;/span&gt;&lt;/div&gt;
                &lt;div class=&quot;ayah-meta&quot;&gt;
                    &lt;span class=&quot;badge&quot;&gt;الجزء: ${a.jozz}&lt;/span&gt;
                    &lt;span class=&quot;badge&quot;&gt;الحزب: ${a.hizb_no || a.hizb}&lt;/span&gt;
                    &lt;span class=&quot;badge&quot;&gt;الصفحة: ${a.page}&lt;/span&gt;
                &lt;/div&gt;
            &lt;/div&gt;`;
    });
    display.innerHTML = content;
    window.scrollTo(0,0);
} catch (e) {
    display.innerHTML = &quot;حدث خطأ.. تأكد من ملف quran_data.json&quot;;
}
}
</script>

</body>
</html>
